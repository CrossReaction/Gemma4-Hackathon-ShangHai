# ============================================================================
# AIPCowork Release Build
# ============================================================================
# Builds and packages the Tauri desktop application for macOS and Windows.
#
# Triggers:
#   - Push a version tag:  git tag v0.1.0 && git push --tags
#   - Manual dispatch from GitHub Actions UI
#
# macOS signing (optional):
#   Add these repository secrets to enable notarized builds:
#     APPLE_CERTIFICATE         - Base64-encoded .p12 certificate
#     APPLE_CERTIFICATE_PASSWORD - Certificate password
#     APPLE_SIGNING_IDENTITY    - Signing identity name
#     APPLE_ID                  - Apple ID for notarization
#     APPLE_PASSWORD            - App-specific password
#     APPLE_TEAM_ID             - Apple Developer Team ID
# ============================================================================

name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  # ==========================================================================
  # macOS — arm64 (Apple Silicon) + x86_64 (Intel)
  # ==========================================================================
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14      # Apple Silicon runner
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-13      # Intel runner
            target: x86_64-apple-darwin
            label: macOS-x64

    name: macOS (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Rust crates ssh2, postgres, mysql need system C libraries
      - name: Install macOS system dependencies
        run: |
          brew install libpq mysql-client openssl@3
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig:$(brew --prefix mysql-client)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> $GITHUB_ENV

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload DMG installer
        uses: actions/upload-artifact@v4
        with:
          name: AIPCowork-${{ matrix.label }}-dmg
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: AIPCowork-${{ matrix.label }}-app
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: warn

  # ==========================================================================
  # Windows — x86_64
  # ==========================================================================
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ssh2 → libssh2-sys → openssl-sys needs OpenSSL headers + lib on Windows
      - name: Install OpenSSL via vcpkg
        run: |
          vcpkg integrate install
          vcpkg install openssl:x64-windows-static

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri app
        env:
          OPENSSL_DIR: C:\vcpkg\installed\x64-windows-static
          OPENSSL_STATIC: '1'
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: AIPCowork-Windows-x64-installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: AIPCowork-Windows-x64-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn

  # ==========================================================================
  # Create GitHub Release (only when triggered by a version tag)
  # ==========================================================================
  release:
    name: Create Release
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
